<svg viewBox="0 0 980 820" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="980" height="820" fill="#f8fafc" rx="12" />

  <!-- 标题区 -->
  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">Schooling · 十部架构</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#5b6475">Ten-Bureau Framework &mdash; AI Agent 驱动的学校治理操作系统</text>

  <!-- 层标签 -->
  <text x="28" y="92" font-size="11" font-weight="600" fill="#5b6475" letter-spacing="1">战略中枢 Strategic Core</text>
  <text x="28" y="240" font-size="11" font-weight="600" fill="#5b6475" letter-spacing="1">路由层 Routing Layer</text>
  <text x="28" y="380" font-size="11" font-weight="600" fill="#5b6475" letter-spacing="1">执行层 Execution Layer</text>

  <!-- 分隔线 -->
  <line x1="28" y1="98" x2="952" y2="98" stroke="#64748b" stroke-width="0.5" opacity="0.3" />
  <line x1="28" y1="246" x2="952" y2="246" stroke="#64748b" stroke-width="0.5" opacity="0.3" />
  <line x1="28" y1="386" x2="952" y2="386" stroke="#64748b" stroke-width="0.5" opacity="0.3" />

  <!-- ==================== Layer 1: 校务办公室 ==================== -->
  <rect x="310" y="108" width="360" height="112" rx="8" ry="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" />
  <text x="490" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">校务办公室</text>
  <text x="490" y="162" text-anchor="middle" font-size="11" fill="#5b6475">总控总参 战略排序 风险判断 向上管理</text>
  <text x="490" y="181" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Executive Office</text>
  <text x="490" y="199" text-anchor="middle" font-size="10" font-style="italic" fill="#5b6475">核心输出：每日驾驶舱 请示汇报 三件最重要的事</text>

  <!-- 校务办 下箭头 到 通讯枢纽 -->
  <line x1="490" y1="220" x2="490" y2="272" stroke="#6366f1" stroke-width="2" />
  <polygon points="490,278 485,268 495,268" fill="#6366f1" />

  <!-- ==================== Layer 2: 通讯枢纽 ==================== -->
  <rect x="120" y="278" width="740" height="80" rx="8" ry="8" fill="#bfdbfe" stroke="#64748b" stroke-width="1.2" />
  <text x="490" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">通讯枢纽</text>
  <text x="490" y="332" text-anchor="middle" font-size="11" fill="#5b6475">信息路由中枢 — 接收 分拣 路由 归档</text>
  <text x="490" y="349" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Communication Hub</text>

  <!-- 域标签 -->
  <text x="80" y="404" font-size="11" font-weight="600" fill="#5b6475">教学与学生域</text>
  <text x="380" y="404" font-size="11" font-weight="600" fill="#5b6475">品牌与表达域</text>
  <text x="680" y="404" font-size="11" font-weight="600" fill="#5b6475">运营与支撑域</text>

  <!-- 域背景框 -->
  <rect x="60" y="414" width="285" height="340" rx="10" ry="10" fill="#eff6ff" stroke="#64748b" stroke-width="1" stroke-dasharray="6 5" />
  <rect x="360" y="414" width="270" height="340" rx="10" ry="10" fill="#f5f3ff" stroke="#64748b" stroke-width="1" stroke-dasharray="6 5" />
  <rect x="645" y="414" width="300" height="340" rx="10" ry="10" fill="#ecfdf5" stroke="#64748b" stroke-width="1" stroke-dasharray="6 5" />

  <!-- 通讯枢纽 到 各执行部门 连线 -->
  <line x1="380" y1="358" x2="202" y2="430" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="320" y1="358" x2="202" y2="540" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="490" y1="358" x2="495" y2="430" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="490" y1="358" x2="495" y2="540" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="610" y1="358" x2="795" y2="430" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="610" y1="358" x2="795" y2="520" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="580" y1="360" x2="727" y2="610" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="580" y1="365" x2="862" y2="610" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />

  <!-- ====== 教学与学生域 ====== -->

  <!-- 教务处 -->
  <rect x="80" y="430" width="245" height="90" rx="8" ry="8" fill="#bfdbfe" stroke="#64748b" stroke-width="1.2" />
  <text x="202" y="462" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">教务处</text>
  <text x="202" y="480" text-anchor="middle" font-size="11" fill="#5b6475">教学管理 考试 课程 认证 学业交付</text>
  <text x="202" y="496" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Academic Affairs</text>
  <text x="202" y="512" text-anchor="middle" font-size="10" fill="#5b6475">亚洲班 A-Level 普高课程</text>

  <!-- 学生处 -->
  <rect x="80" y="540" width="245" height="90" rx="8" ry="8" fill="#c7d2fe" stroke="#64748b" stroke-width="1.2" />
  <text x="202" y="572" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">学生处</text>
  <text x="202" y="590" text-anchor="middle" font-size="11" fill="#5b6475">学生管理 德育 家校沟通 留生</text>
  <text x="202" y="606" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Student Affairs</text>
  <text x="202" y="622" text-anchor="middle" font-size="10" fill="#5b6475">班主任 家长群 学生管理</text>

  <!-- ====== 品牌与表达域 ====== -->

  <!-- 品牌宣传部 -->
  <rect x="380" y="430" width="230" height="90" rx="8" ry="8" fill="#c7d2fe" stroke="#64748b" stroke-width="1.2" />
  <text x="495" y="462" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">品牌宣传部</text>
  <text x="495" y="480" text-anchor="middle" font-size="11" fill="#5b6475">对外表达 招生口径 品牌风险管控</text>
  <text x="495" y="496" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Brand &amp; Communications</text>
  <text x="495" y="512" text-anchor="middle" font-size="10" fill="#5b6475">家长沟通 合作方 媒体</text>

  <!-- 内容创作中心 -->
  <rect x="380" y="540" width="230" height="90" rx="8" ry="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.2" />
  <text x="495" y="572" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">内容创作中心</text>
  <text x="495" y="590" text-anchor="middle" font-size="11" fill="#5b6475">公众号 故事 视频脚本 口播 金句</text>
  <text x="495" y="606" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Content Creation</text>
  <text x="495" y="622" text-anchor="middle" font-size="10" fill="#5b6475">品牌内容 校区故事 视频制作</text>

  <!-- ====== 运营与支撑域 ====== -->

  <!-- 任务管理处 -->
  <rect x="665" y="430" width="260" height="76" rx="8" ry="8" fill="#99f6e4" stroke="#64748b" stroke-width="1.2" />
  <text x="795" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">任务管理处</text>
  <text x="795" y="476" text-anchor="middle" font-size="11" fill="#5b6475">任务分解 截止日期 验收 复盘追踪</text>
  <text x="795" y="494" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Task Management Office</text>

  <!-- 财务与总务处 -->
  <rect x="665" y="520" width="260" height="76" rx="8" ry="8" fill="#fecaca" stroke="#64748b" stroke-width="1.2" />
  <text x="795" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">财务与总务处</text>
  <text x="795" y="566" text-anchor="middle" font-size="11" fill="#5b6475">预算 决算 人事成本 后勤保障</text>
  <text x="795" y="584" text-anchor="middle" font-size="11" font-style="italic" fill="#5b6475">Finance &amp; General Affairs</text>

  <!-- 校历与日程管理处 -->
  <rect x="665" y="610" width="125" height="76" rx="8" ry="8" fill="#fde68a" stroke="#64748b" stroke-width="1.2" />
  <text x="727" y="640" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">校历与日程</text>
  <text x="727" y="657" text-anchor="middle" font-size="11" fill="#5b6475">管理处</text>
  <text x="727" y="676" text-anchor="middle" font-size="10" font-style="italic" fill="#5b6475">Calendar &amp; Scheduling</text>

  <!-- 教育技术中心 -->
  <rect x="800" y="610" width="125" height="76" rx="8" ry="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.2" />
  <text x="862" y="640" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">教育技术中心</text>
  <text x="862" y="657" text-anchor="middle" font-size="10" fill="#5b6475">EdTech AI 数据</text>
  <text x="862" y="676" text-anchor="middle" font-size="10" font-style="italic" fill="#5b6475">技术排障</text>

  <!-- 校长直通虚线 -->
  <path d="M 310 160 Q 260 160 260 250 Q 260 400 202 430" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M 310 180 Q 240 180 240 400 Q 240 500 202 540" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" />
  <text x="154" y="380" font-size="10" fill="#5b6475" transform="rotate(-90,154,380)">校长直通</text>
  <line x1="490" y1="220" x2="495" y2="430" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M 670 180 Q 770 180 770 400 Q 770 570 727 610" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" />

  <!-- 底部三大铁律 -->
  <rect x="80" y="710" width="820" height="52" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="0.5" />
  <text x="490" y="730" text-anchor="middle" font-size="12" font-weight="700" fill="#172033">三大铁律</text>
  <text x="490" y="750" text-anchor="middle" font-size="11" fill="#5b6475">AI辅助三原则（认知 使用 价值） 信息溯源（凡输出必有来源） 时间确认</text>

  <!-- 图例 -->
  <text x="80" y="788" font-size="10" fill="#5b6475">图例</text>
  <rect x="120" y="776" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" />
  <text x="140" y="788" font-size="10" fill="#5b6475">战略中枢</text>
  <rect x="220" y="776" width="14" height="14" rx="3" fill="#bfdbfe" stroke="#64748b" stroke-width="1" />
  <text x="240" y="788" font-size="10" fill="#5b6475">信息路由</text>
  <line x1="330" y1="783" x2="370" y2="783" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" />
  <text x="376" y="788" font-size="10" fill="#5b6475">校长直通</text>
  <line x1="460" y1="783" x2="500" y2="783" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3" />
  <text x="506" y="788" font-size="10" fill="#5b6475">通讯枢纽路由</text>
  <rect x="630" y="776" width="14" height="14" rx="3" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="6 5" />
  <text x="650" y="788" font-size="10" fill="#5b6475">职能域</text>
</svg>
